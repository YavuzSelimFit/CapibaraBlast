<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Capy Merge & Blast</title>
    <meta name="description" content="A cute capybara falling-blocks math puzzle arcade game!">
    <meta name="theme-color" content="#a8d5ba">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/mascot.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=34.2">
    <script>
        // Emergency Debug: Alert errors on device
        window.onerror = function(msg, url, line) {
            alert('CRASH: ' + msg + ' at ' + url + ':' + line);
        };
        console.log = function(msg) {
            // Optional: alert('LOG: ' + msg); 
        };
    </script>
</head>
<body>

<div id="game-container">

    <!-- ─── HEADER ─── -->
    <div class="game-header">
        <div class="top-row">
            <div class="mascot-frame">
                <div id="mascot" title="Capy Mascot"></div>
            </div>
            
            <div class="stats-row">
                <div class="stat-card"><span class="lbl">Score</span><span class="val" id="score">0</span></div>
                <div class="stat-card target"><span class="lbl">LEVEL</span><span class="val" id="level">1</span></div>
            </div>
            <div class="next-wrap">
                <span class="lbl">Next</span>
                <canvas id="next-cv" width="40" height="40"></canvas>
            </div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    </div>
    
    <!-- ─── POWERUPS ─── -->
    <div class="powerups">
        <button class="power-btn" id="pu-hammer" title="Hammer"><img src="assets/btn_hammer.png" alt="H"></button>
        <button class="power-btn" id="pu-shuffle" title="Shuffle"><img src="assets/btn_shuffle.png" alt="S"></button>
        <button class="power-btn" id="pu-plus" title="Bonus"><img src="assets/btn_bomb.png" alt="B"></button>
    </div>

    <!-- ─── BOARD ─── -->
    <div class="board-area">
        <canvas id="game-board"></canvas>
    </div>
    
    <div id="popin-capy" class="popin popin-left"></div>
</div>

    <!-- ─── GAME OVER ─── -->
    <div id="gameover" class="overlay hidden">
        <div class="modal-box">
            <div class="modal-icon">✨</div>
            <h2>Out of Space!</h2>
            <div class="mascot-frame menu-art-frame">
                <img src="assets/mascot.png" class="mascot-img" alt="Mascot">
            </div>
            <p>Score: <span id="final-score">0</span></p>
            <button class="btn btn-primary" id="btn-revive">CONTINUE</button>
            <button class="btn btn-secondary" id="btn-restart">TRY AGAIN</button>
        </div>
    </div>

    <!-- ─── MAIN MENU ─── -->
    <div id="splash" class="overlay menu-overlay">
        <div class="menu-content">
            <img src="assets/game_title.png" class="menu-title-img" alt="Capy Merge & Blast">
            <div class="menu-art-frame">
                <img src="assets/mascot.png" class="menu-art" alt="Capybara">
            </div>
            <div class="menu-btns">
                <button id="btn-start" class="btn btn-3d btn-play">PLAY NOW</button>
                <button id="btn-scores" class="btn btn-3d btn-scores">LEADERBOARD</button>
            </div>
        </div>
    </div>

<!-- ─── LEADERBOARD MODAL ─── -->
<div id="leaderboard-modal" class="overlay hidden">
    <div class="modal-box">
        <h2>Skor Tablosu</h2>
        <div id="score-list" class="score-list">
        </div>
        <button id="btn-close-scores" class="btn btn-secondary">Kapat</button>
    </div>
</div>

<!-- ─── SCRIPTS ─── -->
<script type="module" src="js/Game.js?v=33"></script>
<script>
    // Force PWA update
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?v=29').then(reg => {
            reg.update(); // strongly force update check
        });
    }
</script>
</body>
</html>
